databases:
  - name: danelgh-donostigo-db
    databaseName: donostigo
    user: donostigo_user
    plan: free
    postgresMajorVersion: "18"
    region: frankfurt

services:
  - type: web
    name: danelgh-donostigo-api
    runtime: node
    plan: free
    region: frankfurt
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: danelgh-donostigo-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        value: https://danelgh-donostigo-web.onrender.com

  - type: web
    name: danelgh-donostigo-web
    runtime: static
    region: frankfurt
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://danelgh-donostigo-api.onrender.com/api
